<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopción de Mascotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* CONFIGURACIÓN GENERAL */
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fdfaf6;
            color: #4a3728;
            padding: 40px 20px;
        }

        .page-wrapper { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 80px; }

        /* SECCIÓN 1: HERO */
        .hero-container { display: flex; flex-wrap: wrap; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .text-section { flex: 1; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        h1 { font-size: 2.8rem; line-height: 1.2; margin-bottom: 20px; text-transform: uppercase; font-weight: 800; letter-spacing: -1px; }
        .hero-container p { font-size: 1.1rem; line-height: 1.6; margin-bottom: 35px; opacity: 0.8; font-weight: 400; }
        .buttons { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn { padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 0.9rem; transition: transform 0.2s, opacity 0.2s; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-primary { background-color: #f08989; color: white; }
        .btn-secondary { border: 2px solid #f08989; color: #f08989; }
        .image-section { flex: 1; background-image: url('perritos.jpeg'); background-size: contain; background-position: center; background-repeat: no-repeat; min-height: 350px; }

        /* SECCIÓN 2: ¿POR QUÉ ADOPTAR? */
        .slide-adopt-container { display: flex; align-items: center; justify-content: space-between; gap: 40px; background: white; padding: 50px 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .slide-left { flex: 1; max-width: 230px; display: flex; justify-content: center; align-items: center; }
        .slide-left img { max-width: 100%; height: auto; display: block; border-radius: 10px; }
        .slide-center { flex: 2; display: flex; flex-direction: column; gap: 15px; }
        .slide-center h2 { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid #f08989; padding-bottom: 5px; display: inline-block; }
        .slide-center p { font-size: 0.95rem; line-height: 1.6; font-weight: 400; opacity: 0.85; }
        .slide-right { flex: 1; max-width: 280px; background-color: #fbebeb; border-radius: 30px; padding: 35px 20px; text-align: center; }
        .card-highlight-text { font-size: 1.1rem; line-height: 1.5; font-weight: 700; color: #4a3728; }

        /* CONTENEDOR DINÁMICO (1/4 DE PANTALLA) */
        .dynamic-banner-wrapper {
            position: relative;
            min-height: 280px;
        }

        .dynamic-component {
            display: none;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        .dynamic-component.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* COMPONENTE A: PROCESO DE ADOPCIÓN */
        .process-section { text-align: center; }
        .process-section h2 { font-size: 1.6rem; font-weight: 800; text-transform: uppercase; margin-bottom: 40px; letter-spacing: 1px; }
        .process-steps { display: flex; justify-content: space-between; align-items: flex-start; position: relative; max-width: 900px; margin: 0 auto; }
        .process-steps::before { content: ""; position: absolute; top: 45px; left: 50px; right: 50px; height: 2px; border-top: 2px dashed #f2b5b5; z-index: 1; }
        .step-item { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; align-items: center; max-width: 160px; }
        .icon-circle { width: 90px; height: 90px; background-color: #f08989; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(240,137,137,0.3); }
        .icon-circle svg { width: 45px; height: 45px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .step-text-block { display: flex; align-items: center; gap: 8px; text-align: left; }
        .step-number { background-color: #fbebeb; color: #f08989; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; flex-shrink: 0; }
        .step-text-block p { font-size: 0.9rem; font-weight: 700; line-height: 1.3; }

        /* COMPONENTE B: BANNER FRASE INSPIRADORA */
        .quote-banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 0;
            overflow: hidden;
        }
        .quote-banner.active { display: flex; }
        
        .quote-text-container {
            flex: 1.2;
            background-color: #fbebeb;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            height: 100%;
            min-height: 280px;
        }
        .quote-text-container h2 {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.4;
            color: #4a3728;
            max-width: 500px;
        }
        .quote-image-container {
            flex: 1;
            background-image: url('frase.jpeg');
            background-size: cover;
            background-position: center;
            min-height: 280px;
        }

        /* SECCIÓN 3: NUESTROS PELUDITOS */
        .pets-section { text-align: center; }
        .section-title { font-size: 2rem; text-transform: uppercase; font-weight: 800; margin-bottom: 40px; }
        .pets-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 25px; }
        .pet-card { background: white; padding: 25px 20px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); text-align: left; display: flex; flex-direction: column; justify-content: space-between; }
        .pet-img-container { width: 100%; height: 220px; margin-bottom: 15px; border-radius: 15px; background-size: cover; background-position: center; background-repeat: no-repeat; }
        .pet-card h3 { font-size: 1.3rem; margin-bottom: 12px; font-weight: 800; text-transform: uppercase; }
        .pet-card ul { list-style: none; margin-bottom: 25px; font-size: 0.9rem; }
        .pet-card li { margin-bottom: 8px; opacity: 0.85; font-weight: 400; position: relative; padding-left: 15px; }
        .pet-card li::before { content: "•"; color: #f08989; font-weight: bold; position: absolute; left: 0; }
        .btn-pet { display: block; text-align: center; padding: 12px 15px; background-color: #f08989; color: white; text-decoration: none; border-radius: 50px; font-weight: 700; font-size: 0.85rem; transition: background-color 0.2s; }
        .btn-pet:hover { background-color: #e27676; }

        /* SECCIÓN 4: FORMULARIO QUIERO ADOPTAR */
        .adoption-form-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }
        .form-info-side {
            flex: 1;
            max-width: 300px;
        }
        .form-info-side h2 {
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        .form-info-side p {
            font-size: 0.95rem;
            line-height: 1.5;
            opacity: 0.8;
            font-weight: 400;
        }
        .form-fields-side {
            flex: 2;
            width: 100%;
        }
        .form-grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-input-wrapper {
            position: relative;
        }
        .form-input-wrapper input, 
        .form-fields-side select, 
        .form-fields-side textarea {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #e1dcd6;
            background-color: #fdfaf6;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: #4a3728;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input-wrapper input:focus, 
        .form-fields-side select:focus, 
        .form-fields-side textarea:focus {
            border-color: #f08989;
        }
        .form-fields-side select {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23f08989' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
            cursor: pointer;
        }
        .form-fields-side textarea {
            resize: none;
            height: 100px;
            margin-top: 15px;
            margin-bottom: 25px;
        }
        .form-submit-block {
            display: flex;
            justify-content: flex-end;
        }
        .btn-submit {
            background-color: #f08989;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 5px 15px rgba(240,137,137,0.3);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        /* RESPONSIVE */
        @media (max-width: 950px) {
            .slide-adopt-container, .quote-banner.active, .adoption-form-container { flex-direction: column; text-align: center; }
            .slide-left, .slide-right, .quote-image-container, .form-info-side { max-width: 100%; width: 100%; }
            .quote-image-container { min-height: 200px; }
            .process-steps { flex-direction: column; align-items: center; gap: 30px; }
            .process-steps::before { display: none; }
            .step-item { max-width: 100%; }
            .quote-text-container { padding: 35px 20px; min-height: auto; }
            .quote-text-container h2 { font-size: 1.4rem; }
            .form-grid-2col { grid-template-columns: 1fr; }
            .form-submit-block { justify-content: center; }
            .btn-submit { width: 100%; }
        }

        @media (max-width: 768px) {
            .hero-container { flex-direction: column; }
            .image-section { min-height: 300px; }
            .text-section { padding: 35px 20px; }
            h1 { font-size: 2rem; }
            .section-title { font-size: 1.6rem; }
            .page-wrapper { gap: 50px; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">

        <section class="hero-container">
            <div class="text-section">
                <h1>Ellos solo necesitan<br>una oportunidad</h1>
                <p>Cada uno tiene una historia, pero todos comparten el mismo sueño: encontrar una familia.</p>
                <div class="buttons">
                    <a href="#nuestros-peluditos" class="btn btn-primary">Conocer a los perritos</a>
                    <a href="#quiero-adoptar-seccion" class="btn btn-secondary">Quiero adoptar</a>

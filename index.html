<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopción de Mascotas</title>
    <!-- Google Fonts: Solo Montserrat con pesos 400 (normal) y 800 (extra bold) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fdfaf6; /* Fondo crema claro */
            color: #4a3728; /* Marrón oscuro para el texto */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            max-width: 1000px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .text-section {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        h1 {
            font-size: 2.8rem; 
            line-height: 1.2;
            margin-bottom: 20px;
            text-transform: uppercase; /* Todo en mayúsculas */
            font-weight: 800; /* Importancia alta: Extra Bold */
            letter-spacing: -1px;
        }

        p { 
            font-size: 1.1rem; 
            line-height: 1.6;
            margin-bottom: 35px; 
            opacity: 0.8; 
            font-weight: 400; /* Importancia baja: Texto normal */
        }

        .buttons { display: flex; gap: 15px; flex-wrap: wrap; }

        .btn {
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800; /* Botones llamativos: Extra Bold */
            font-size: 0.9rem;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-primary { background-color: #f08989; color: white; }
        .btn-secondary { border: 2px solid #f08989; color: #f08989; }

        .image-section {
            flex: 1;
            background-image: url('perritos.jpeg'); /* Tu imagen */
            background-size: contain; /* Ajuste completo sin cortes */
            background-position: center;
            background-repeat: no-repeat;
            min-height: 350px;
        }

        /* Ajustes para Pantallas Móviles */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .image-section { min-height: 300px; }
            .text-section { padding: 30px 20px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <section class="container">
        <div class="text-section">
            <h1>Ellos solo necesitan<br>una oportunidad</h1>
            <p>Cada uno tiene una historia, pero todos comparten el mismo sueño: encontrar una familia.</p>
            <div class="buttons">
                <a href="#" class="btn btn-primary">Conocer a los perritos</a>
                <a href="#" class="btn btn-secondary">Quiero adoptar</a>
            </div>
        </div>
        <div class="image-section"></div>
    </section>

</body>
</html>
